<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page-container">
    <section class="panel">
        <h1>Reset Password</h1>
        <p class="subtext">Enter your username and new password</p>

        <form method="POST" class="form-box">
            <input type="text" name="username" placeholder="Username" required value="{{ username or '' }}">
            <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
            <p id="strength"></p>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit" class="primary">Reset Password</button>
        </form>

        {% if message %}
            <div class="message {% if 'successful' in message %}success{% endif %}">{{ message }}</div>
        {% endif %}

        <a href="/login" class="back-link">← Back to Login</a>
    </section>
</div>

<script>
const passwordInput = document.getElementById("new_password");
const strengthText = document.getElementById("strength");

passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;
    let requirements = [];
    let allMet = true;

    // Check each requirement
    if (val.length < 8) {
        requirements.push("❌ At least 8 characters");
        allMet = false;
    } else {
        requirements.push("✓ At least 8 characters");
    }

    if (!/[A-Za-z]/.test(val)) {
        requirements.push("❌ At least one letter");
        allMet = false;
    } else {
        requirements.push("✓ At least one letter");
    }

    if (!/\d/.test(val)) {
        requirements.push("❌ At least one number");
        allMet = false;
    } else {
        requirements.push("✓ At least one number");
    }

    if (!/[^A-Za-z0-9]/.test(val)) {
        requirements.push("❌ At least one special character");
        allMet = false;
    } else {
        requirements.push("✓ At least one special character");
    }

    let strength = allMet ? "Strong" : "Weak";
    let color = allMet ? "#28a745" : "#dc3545";

    strengthText.innerHTML = `<strong style="color: ${color};">Password: ${strength}</strong><br/>${requirements.join("<br/>")}`;
    strengthText.style.color = color;
    strengthText.style.fontWeight = "500";
    strengthText.style.fontSize = "0.85rem";
});
</script>
</body>
</html>
